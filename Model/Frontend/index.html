<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="overlay">
      <form class="formEmp">
        <h3>Add Employee</h3>

        <input type="text" name="fullname" placeholder="Full name" required />
        <small class="FirstError"></small>

        <input type="email" name="email" placeholder="Email" required />
        <small class="EmailError"></small>

        <input type="number" name="age" placeholder="Age" required />
        <small class="AgeError"></small>

        <input
          type="text"
          name="department"
          placeholder="Department"
          required
        />
        <small class="LastError"></small>

        <input type="text" name="position" placeholder="Position" required />
        <small class="PasswordError"></small>

        <input
          type="text"
          name="employeeid"
          placeholder="Employee ID"
          required
        />
          <small class="employeeError"></small>

        <div class="btn">
          <button type="submit">Save</button>
          <button type="button" class="removeBtn">Cancel</button>
        </div>
      </form>
    </div>
    <section class="employeeDash">
      <article class="rightBar">
        <div class="rightBar_one">
          <i class="fa-solid fa-users"></i>
          <h3>Employee Dashboard</h3>
        </div>

        <div class="rightBar_two">
          <i class="fa-solid fa-users"></i>
          <h5>Employees</h5>
        </div>
      </article>
      <article class="leftBar">
        <form class="form">
          <input type="text" class="search" placeholder="search employee" />
          <button type="submit">
           <i class="fa-solid fa-search"></i>
          </button>
        </form>
        <div class="leftBar_two">
          <h3>Employees</h3>
          <div class="addBtn">
            <i class="fa-solid fa-add"></i>
            <p>Add Employee</p>
          </div>
        </div>
        <div class="leftBar_three">
          <div class="one">
            <p>ID</p>
            <p>Name</p>
            <p>Email</p>
            <p>Age</p>
            <p>Department</p>
            <p>Position</p>
            <p>Actions</p>
          </div>

          <div class="result"></div>
        </div>
      </article>
    </section>

    <script src="web.js"></script>
  </body>
</html>
